<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Steam -->
  <path d="M32 22 Q29 17 32 12 Q35 7 32 2" stroke="#aaa" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M40 22 Q37 17 40 12 Q43 7 40 2" stroke="#aaa" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Chopsticks -->
  <line x1="62" y1="8" x2="78" y2="42" stroke="#111" stroke-width="4" stroke-linecap="round"/>
  <line x1="72" y1="8" x2="86" y2="42" stroke="#111" stroke-width="4" stroke-linecap="round"/>

  <!-- Noodle mound (white with black outline) -->
  <ellipse cx="50" cy="40" rx="34" ry="14" fill="white" stroke="#111" stroke-width="3.5"/>
  <!-- Noodle texture dots -->
  <ellipse cx="38" cy="39" rx="4" ry="2" fill="#111"/>
  <ellipse cx="50" cy="37" rx="4" ry="2" fill="#111"/>
  <ellipse cx="62" cy="39" rx="4" ry="2" fill="#111"/>
  <ellipse cx="44" cy="44" rx="4" ry="2" fill="#111"/>
  <ellipse cx="56" cy="44" rx="4" ry="2" fill="#111"/>

  <!-- Bowl (purple) -->
  <path d="M16 50 Q16 80 50 82 Q84 80 84 50 Z" fill="#77567A" stroke="#111" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Bowl shine -->
  <path d="M72 58 Q74 64 73 70" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M76 62 Q77 66 76 70" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Bowl base -->
  <rect x="43" y="82" width="14" height="6" rx="2" fill="#111"/>

  <!-- Rim line separating mound and bowl -->
  <ellipse cx="50" cy="50" rx="34" ry="5" fill="none" stroke="#111" stroke-width="3.5"/>
</svg>
